version: "3.8"

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_bug_fixer
      POSTGRES_USER: ${POSTGRES_USER:-aibugfixer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aibugfixer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Web Application (Next.js)
  # ─────────────────────────────────────────────
  web:
    build: ./router
    command: npm run start
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://${POSTGRES_USER:-aibugfixer}:${POSTGRES_PASSWORD}@postgres:5432/ai_bug_fixer
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      - SENTRY_ORG=${SENTRY_ORG}
      - CIRCLECI_TOKEN=${CIRCLECI_TOKEN}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Background Worker (BullMQ Job Processor)
  # ─────────────────────────────────────────────
  worker:
    build: ./router
    command: npm run worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://${POSTGRES_USER:-aibugfixer}:${POSTGRES_PASSWORD}@postgres:5432/ai_bug_fixer
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      - SENTRY_ORG=${SENTRY_ORG}
      - CIRCLECI_TOKEN=${CIRCLECI_TOKEN}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - HOST_USER=${USER}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
      - USE_GIT_WORKSPACES=${USE_GIT_WORKSPACES:-false}
      - STALE_WORKTREE_TTL_HOURS=${STALE_WORKTREE_TTL_HOURS:-24}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/workspaces
      - /Users/${USER}/.claude:/claude-creds:ro
    networks:
      - internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Agent Runners (images only, spawned dynamically by runner plugins)
  # ─────────────────────────────────────────────
  agent-runner-claude:
    build: ./agent-runners/claude-code
    image: agent-runner-claude:latest
    profiles:
      - build-only

  # Future runners can be added here:
  # agent-runner-openai:
  #   build: ./agent-runners/openai
  #   image: agent-runner-openai:latest
  #   profiles:
  #     - build-only

  # ─────────────────────────────────────────────
  # Tunnel
  # ─────────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    networks:
      - internal
    depends_on:
      - web
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Monitoring
  # ─────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - internal
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  portainer_data:
  workspaces:
