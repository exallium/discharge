services:
  # PostgreSQL for testing (uses different port)
  postgres-test:
    image: postgres:16-alpine
    container_name: claude-agent-postgres-test
    environment:
      POSTGRES_DB: ai_bug_fixer_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    networks:
      - test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 3s
      retries: 5
    # Use tmpfs for faster tests (no persistence needed)
    tmpfs:
      - /var/lib/postgresql/data

  # Redis for testing (uses different DB and port)
  redis-test:
    image: redis:7-alpine
    container_name: claude-agent-redis-test
    ports:
      - "6380:6379"
    networks:
      - test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
    command: redis-server --databases 16

  # Mock external service for testing webhooks
  mock-service:
    image: kennethreitz/httpbin
    container_name: claude-agent-mock-service
    ports:
      - "8080:80"
    networks:
      - test

networks:
  test:
    driver: bridge
